name = "elevate-showcase"
main = "worker/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
account_id = "c899831ce29bf9df4f95a0bb38f5e744"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Custom domain — wrangler provisions the hostname, DNS, and cert on deploy.
[[routes]]
pattern = "elevate-demo.danwaldie.com"
custom_domain = true

# Secrets (set via `wrangler secret put <NAME>`; .dev.vars for local `wrangler dev`):
#   SERVER_SECRET     — HMAC key for personal-link codes + session tokens
#   ANTHROPIC_API_KEY — Claude API key for the Concierge proxy

name = "elevate-showcase"
main = "worker/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Public showcase demo deploys to the default *.workers.dev hostname.
# To pin a custom demo subdomain, uncomment and set the pattern, then redeploy:
# [[routes]]
# pattern = "elevate-demo.example.com"
# custom_domain = true

# Secrets (set via `wrangler secret put <NAME>`; .dev.vars for local `wrangler dev`):
#   SERVER_SECRET     — HMAC key for personal-link codes + session tokens
#   ANTHROPIC_API_KEY — Claude API key for the Concierge proxy
